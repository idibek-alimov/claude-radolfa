# =============================================================================
# Fail2ban filter — Nginx rate limit violations
# =============================================================================
# Deploy: cp infra/fail2ban/filter.d/nginx-req-limit.conf \
#              /etc/fail2ban/filter.d/nginx-req-limit.conf
# =============================================================================

[Definition]
failregex = limiting requests, excess: [\d\.]+ by zone "[^"]+", client: <HOST>
ignoreregex =

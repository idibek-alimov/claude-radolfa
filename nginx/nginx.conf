# =============================================================================
# Radolfa — Nginx Main Configuration (Production)
# =============================================================================
# Global settings only. All virtual hosts live in conf.d/*.conf
# In production (docker-compose.prod.yml), conf.d/ is mounted alongside this file.
# =============================================================================

worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ---------------------------------------------------------------------------
    # Logging
    # ---------------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # ---------------------------------------------------------------------------
    # Performance
    # ---------------------------------------------------------------------------
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # ---------------------------------------------------------------------------
    # Security
    # ---------------------------------------------------------------------------
    server_tokens off;

    # ---------------------------------------------------------------------------
    # Gzip
    # ---------------------------------------------------------------------------
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml
        application/json application/javascript application/xml
        application/xml+rss text/javascript;

    # ---------------------------------------------------------------------------
    # Rate-limiting zones
    # ---------------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api_limit:10m     rate=10r/s;
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=erp_limit:10m     rate=20r/s;

    # ---------------------------------------------------------------------------
    # Upstream servers
    # ---------------------------------------------------------------------------
    upstream backend {
        server backend:8080;
        keepalive 32;
    }

    upstream frontend {
        server frontend:3000;
        keepalive 32;
    }

    # ERPNext bench gunicorn on the VPS host.
    # host.docker.internal is injected via extra_hosts in docker-compose.prod.yml.
    upstream erpnext {
        server host.docker.internal:8000;
        keepalive 16;
    }

    # ---------------------------------------------------------------------------
    # Virtual hosts — one file per subdomain
    # ---------------------------------------------------------------------------
    include /etc/nginx/conf.d/*.conf;
}

# =============================================================================
# Local Development — localhost
# Matches requests coming in as localhost (dev Docker setup).
# In production this block is never hit because all traffic arrives
# via the real domain names (radolfa.site / api.radolfa.site).
# =============================================================================

server {
    listen 80 default_server;
    server_name localhost _;

    # Nginx health check
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # API — proxy to Spring Boot backend
    location /api/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header Connection         "";

        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # Everything else — proxy to Next.js frontend
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header Connection         "";

        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}

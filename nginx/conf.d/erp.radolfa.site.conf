# =============================================================================
# ERPNext — erp.radolfa.site
# Proxies to ERPNext bench gunicorn on host port 8000 (via host.docker.internal)
# WebSocket (socket.io) proxied from host port 9000
# =============================================================================

# HTTP — redirect to HTTPS + ACME challenge
server {
    listen 80;
    listen [::]:80;
    server_name erp.radolfa.site;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — ERPNext
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name erp.radolfa.site;

    # SSL
    ssl_certificate     /etc/letsencrypt/live/erp.radolfa.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.radolfa.site/privkey.pem;
    ssl_session_timeout  1d;
    ssl_session_cache    shared:SSL_erp:10m;
    ssl_session_tickets  off;
    ssl_protocols        TLSv1.2 TLSv1.3;
    ssl_ciphers          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=63072000" always;

    # ERPNext handles its own file uploads; allow generous body size
    client_max_body_size 100M;

    # --- ERPNext WebSocket (socket.io on port 9000) -----------------------
    # Must come before the catch-all '/' block
    location /socket.io {
        proxy_pass         http://host.docker.internal:9000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade            $http_upgrade;
        proxy_set_header   Connection         "upgrade";
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_read_timeout 86400s;
    }

    # --- ERPNext static assets (served directly — gunicorn does NOT serve these) ---
    location /assets {
        alias /opt/frappe/frappe-bench/sites/assets;
        try_files $uri =404;
        expires 1d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /files {
        alias /opt/frappe/frappe-bench/sites/erp.radolfa.site/public/files;
        try_files $uri =404;
    }

    location /private/files {
        alias /opt/frappe/frappe-bench/sites/erp.radolfa.site/private/files;
        try_files $uri =404;
    }

    # --- ERPNext main application -----------------------------------------
    location / {
        limit_req zone=erp_limit burst=30 nodelay;

        proxy_pass         http://erpnext;
        proxy_http_version 1.1;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header Connection         "";

        proxy_connect_timeout  60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        proxy_buffering   on;
        proxy_buffer_size 4k;
        proxy_buffers     8 4k;
    }
}

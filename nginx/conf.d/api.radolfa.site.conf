# =============================================================================
# Backend API — api.radolfa.site
# Proxies to Spring Boot container (backend:8080)
# =============================================================================

# HTTP — redirect to HTTPS + ACME challenge
server {
    listen 80;
    listen [::]:80;
    server_name api.radolfa.site;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — API
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.radolfa.site;

    # SSL
    ssl_certificate     /etc/letsencrypt/live/api.radolfa.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.radolfa.site/privkey.pem;
    ssl_session_timeout  1d;
    ssl_session_cache    shared:SSL_api:10m;
    ssl_session_tickets  off;
    ssl_protocols        TLSv1.2 TLSv1.3;
    ssl_ciphers          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options    "nosniff"         always;
    add_header X-Frame-Options           "DENY"            always;

    # Allow large uploads (product images go through the backend)
    client_max_body_size 50M;

    # --- Application API --------------------------------------------------
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass         http://backend;
        proxy_http_version 1.1;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header X-Forwarded-Host   $host;
        proxy_set_header Connection         "";

        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        proxy_buffering   on;
        proxy_buffer_size 4k;
        proxy_buffers     8 4k;
    }

    # --- Actuator (health / metrics) -------------------------------------
    # Restrict to VPN / internal IPs in a hardened setup; open for now.
    location /actuator/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # --- Swagger UI -------------------------------------------------------
    location /swagger-ui/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    location /swagger-ui.html {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    location /v3/api-docs {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # --- Catch-all fallback -----------------------------------------------
    location / {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }
}

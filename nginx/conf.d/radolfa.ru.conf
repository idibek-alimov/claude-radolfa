# =============================================================================
# Storefront — radolfa.ru
# Proxies to Next.js frontend container (frontend:3000)
# =============================================================================

# HTTP — redirect to HTTPS + serve ACME challenge for certbot
server {
    listen 80;
    listen [::]:80;
    server_name radolfa.ru www.radolfa.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://radolfa.ru$request_uri;
    }
}

# HTTPS — redirect www → non-www
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.radolfa.ru;

    ssl_certificate     /etc/letsencrypt/live/radolfa.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/radolfa.ru/privkey.pem;

    return 301 https://radolfa.ru$request_uri;
}

# HTTPS — main storefront
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name radolfa.ru;

    # SSL
    ssl_certificate     /etc/letsencrypt/live/radolfa.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/radolfa.ru/privkey.pem;
    ssl_session_timeout  1d;
    ssl_session_cache    shared:SSL_storefront:10m;
    ssl_session_tickets  off;
    ssl_protocols        TLSv1.2 TLSv1.3;
    ssl_ciphers          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options            "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options     "nosniff"                             always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"     always;

    # Nginx health check (used by docker-compose healthcheck)
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Next.js static assets — immutable 1-year cache
    location /_next/static/ {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        add_header         Cache-Control "public, max-age=31536000, immutable";
        access_log         off;
    }

    # Everything else → Next.js
    location / {
        limit_req zone=general_limit burst=50 nodelay;

        proxy_pass         http://frontend;
        proxy_http_version 1.1;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header X-Forwarded-Host   $host;
        proxy_set_header Connection         "";

        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        proxy_buffering   on;
        proxy_buffer_size 4k;
        proxy_buffers     8 4k;
    }
}

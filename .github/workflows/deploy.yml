name: Deploy to Production

on:
  push:
    branches: [main]
  # Allow manual trigger with optional tag override
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (leave blank for current SHA)"
        required: false
        default: ""

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/idibek-alimov/claude-radolfa-backend
  FRONTEND_IMAGE: ghcr.io/idibek-alimov/claude-radolfa-frontend

jobs:

  # ---------------------------------------------------------------------------
  # 1. Build Docker images and push to GHCR
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.tag.outputs.value }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        run: |
          if [[ -n "${{ github.event.inputs.image_tag }}" ]]; then
            echo "value=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "value=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- Backend ---
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.value }}
            ${{ env.BACKEND_IMAGE }}:latest

      # --- Frontend ---
      # NEXT_PUBLIC_* vars must be injected at build time — they are inlined
      # by Next.js at compile time and cannot be overridden at runtime.
      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.value }}
            ${{ env.FRONTEND_IMAGE }}:latest

  # ---------------------------------------------------------------------------
  # 2. Deploy to VPS
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production    # requires manual approval if configured in GitHub

    steps:
      - name: Checkout (for config files)
        uses: actions/checkout@v4

      - name: Copy docker-compose.prod.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_DEPLOY_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          source: "docker-compose.prod.yml,nginx/nginx.conf,nginx/conf.d"
          target: "/opt/radolfa"
          overwrite: true

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_DEPLOY_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            set -e
            cd /opt/radolfa

            IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"
            echo "Deploying tag: ${IMAGE_TAG}"

            # Update image tag in the env file
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${IMAGE_TAG}/" .env.production

            # Log in to GHCR using the GitHub token passed as a secret
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u idibek-alimov --password-stdin

            # Pull new images
            docker compose -f docker-compose.prod.yml --env-file .env.production pull

            # Deploy (recreate changed containers only)
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d --remove-orphans

            # Reload nginx to pick up any config changes
            docker exec radolfa-nginx nginx -s reload 2>/dev/null || true

            # Wait for health checks
            echo "Waiting 45 s for containers to stabilise..."
            sleep 45

            # Print status
            docker compose -f docker-compose.prod.yml ps

            # Quick end-to-end smoke test
            curl -sf --max-time 10 http://localhost/nginx-health \
              && echo "Smoke test PASSED" \
              || { echo "Smoke test FAILED"; exit 1; }

            echo "Deploy complete: ${IMAGE_TAG}"

      # -----------------------------------------------------------------------
      # Rollback: restore :latest if deploy fails
      # -----------------------------------------------------------------------
      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_DEPLOY_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            set -e
            cd /opt/radolfa

            echo "ROLLBACK: restoring to :latest"
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=latest/" .env.production

            docker compose -f docker-compose.prod.yml --env-file .env.production up -d
            sleep 30
            docker compose -f docker-compose.prod.yml ps

            echo "ROLLBACK COMPLETE — running :latest"
